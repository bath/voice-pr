<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>voice-pr</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>🎙️ voice-pr</h1>
        <p class="tagline">
          Speak your feedback at your own PR. Walk away. Come back to commits.
        </p>
      </header>

      <label class="field">
        <span>Pull request</span>
        <input
          id="pr"
          type="text"
          placeholder="https://github.com/owner/repo/pull/123  (or owner/repo#123)"
          autocomplete="off"
          spellcheck="false"
        />
      </label>

      <fieldset class="mode">
        <legend>Mode</legend>
        <label>
          <input type="radio" name="mode" value="author" checked />
          <span><strong>Author mode</strong> commits fixes to my PR branch</span>
        </label>
        <label>
          <input type="radio" name="mode" value="reviewer" />
          <span><strong>Reviewer mode</strong> posts review comments only</span>
        </label>
      </fieldset>

      <section class="recorder">
        <button id="talk" class="talk" aria-pressed="false">
          <span class="dot"></span>
          <span class="label">Hold&nbsp;<kbd>Space</kbd>&nbsp;or click to talk</span>
        </button>
        <p id="listening" class="listening" hidden>listening…</p>
      </section>

      <label class="field">
        <span>Transcript <small>(editable — fix a word before you fire)</small></span>
        <textarea
          id="transcript"
          rows="4"
          placeholder="Your speech shows up here. You can also just type."
        ></textarea>
      </label>

      <div class="actions">
        <button id="fire" class="fire" disabled>Address my feedback →</button>
        <span id="hint" class="hint"></span>
      </div>

      <section id="status" class="status" hidden>
        <div class="status-head">
          <span class="spinner" id="spinner"></span>
          <span id="status-line">working…</span>
        </div>
        <p id="reassure" class="reassure">
          This runs asynchronously — you can close this tab. Your PR will have
          commits and comments in a few minutes.
        </p>
        <ol id="log" class="log"></ol>
      </section>

      <section id="result" class="result" hidden></section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
