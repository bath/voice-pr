<!doctype html>
<!-- THROWAWAY PROTOTYPE — three structurally distinct directions, ?variant=A|B|C. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>voice-pr · reimagined interface prototype</title>
  <style>
    :root { color-scheme: dark; --bg:#0b0d10; --surface:#15181d; --lift:#1c2026; --line:#2b3038; --text:#f2f4f7; --muted:#969da8; --blue:#6ea8fe; --green:#6fda8b; --amber:#f0bf61; --ease:cubic-bezier(.23,1,.32,1); }
    * { box-sizing:border-box } body { margin:0; min-height:100vh; background:radial-gradient(70% 70% at 50% 100%,#152339 0,transparent 60%),var(--bg); color:var(--text); font:14px/1.45 Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    button,select { font:inherit } button { cursor:pointer } .prototype-mark { position:fixed; top:16px; left:18px; color:#737b87; font:600 10px ui-monospace,monospace; letter-spacing:.1em; z-index:5 }
    #app { min-height:100vh; display:grid; place-items:center; padding:70px 24px 120px } .variant { width:min(980px,100%); animation:enter 180ms var(--ease) both } @keyframes enter { from{opacity:0;transform:translateY(8px) scale(.99)} }
    .github { min-height:600px; border:1px solid #222832; border-radius:16px; background:#0e1116; overflow:hidden; box-shadow:0 30px 80px #0008 } .ghbar { height:58px; display:flex; align-items:center; gap:14px; padding:0 20px; border-bottom:1px solid #242a33; color:#8f96a1 } .ghbar b{color:#dce1e8}.diff { display:grid; grid-template-columns:54px 1fr; margin:46px; border:1px solid #252b34; border-radius:10px; overflow:hidden; color:#68717e; font:12px/1.75 ui-monospace,monospace }.nums{padding:18px;text-align:right;background:#11151b}.code{padding:18px 22px;background:linear-gradient(#10141a,#0e1116)}
    .scope { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:11px }.scope b{color:var(--text)} select { padding:6px 28px 6px 9px; border:1px solid var(--line); border-radius:8px; background:#111419; color:var(--text) }.session { color:#717985; font-size:10px }
    .state-tabs { display:flex; gap:3px; padding:4px; border:1px solid var(--line); border-radius:10px; background:#0d1014 }.state-tabs button { border:0; border-radius:7px; padding:6px 9px; background:transparent; color:var(--muted); font-size:11px }.state-tabs button.on { background:var(--lift);color:var(--text) }
    .status { display:grid; grid-template-columns:24px 1fr; gap:12px; padding:17px; border-radius:13px; background:var(--lift); min-height:92px; transition:background 120ms var(--ease) }.orb { width:20px;height:20px;border-radius:50%;border:2px solid #39404b;border-top-color:var(--blue);animation:spin .8s linear infinite}.idle .orb{border-color:#39404b;animation:none}.success .orb{display:grid;place-items:center;border-color:var(--green);animation:none;color:var(--green)}.success .orb:after{content:'✓'}.blocked .orb{display:grid;place-items:center;border-color:var(--amber);animation:none;color:var(--amber)}.blocked .orb:after{content:'!'}.kicker{color:var(--blue);font-size:10px;font-weight:750;text-transform:uppercase;letter-spacing:.09em}.blocked .kicker{color:var(--amber)}.success .kicker{color:var(--green)}.title{margin-top:3px;font-size:14px;font-weight:680}.detail{margin-top:3px;color:var(--muted);font-size:11px}.action { margin-top:10px; border:0;border-radius:8px;padding:7px 10px;background:#f0f3f8;color:#11151a;font-size:11px;font-weight:700}.action:active{transform:scale(.97)} @keyframes spin{to{transform:rotate(1turn)}}
    .a-shell { position:relative }.a-panel { position:absolute; right:30px; bottom:28px; width:355px; border:1px solid var(--line); border-radius:16px; overflow:hidden; background:var(--surface); box-shadow:0 18px 60px #000a }.a-head { display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:1px solid #252a32}.a-head strong{font-size:12px}.a-context{display:flex;gap:8px;padding:10px 14px;color:var(--muted);font-size:11px}.a-scope{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-block:1px solid #252a32}.a-status{padding:14px}.a-panel .state-tabs{position:absolute;right:12px;top:-48px}
    .b-wrap { display:grid; grid-template-columns:220px 1fr; min-height:620px;border:1px solid #252b34;border-radius:18px;overflow:hidden;background:#101318 }.b-rail{padding:26px 18px;background:#15191f;border-right:1px solid #292f38}.b-rail h2{margin:0 0 24px;font-size:15px}.b-rail .scope{display:grid;gap:8px;align-items:start}.b-rail select{width:100%}.b-rail .session{margin-top:4px}.b-main{padding:58px 64px}.b-main .state-tabs{width:max-content;margin-bottom:38px}.b-main h1{max-width:520px;margin:0;font-size:38px;line-height:1.05;letter-spacing:-.04em}.b-main>p{max-width:560px;color:var(--muted);font-size:15px}.b-main .status{margin-top:42px;max-width:580px;background:transparent;border-top:1px solid var(--line);border-radius:0;padding:22px 0}.b-meta{margin-top:50px;display:flex;gap:30px;color:#727a86;font:11px ui-monospace,monospace}
    .c-wrap { min-height:620px;display:grid;grid-template-columns:1fr 330px;border:1px solid #252b34;border-radius:18px;overflow:hidden;background:#101318}.c-canvas{padding:42px}.c-canvas h1{font-size:26px;margin:0}.c-canvas p{color:var(--muted)}.comments{margin-top:50px;display:grid;gap:14px}.comment{padding:14px 16px;border-left:2px solid #3a424e;background:#14181e;color:#aab1bb;font-size:12px}.c-rail{display:flex;flex-direction:column;padding:20px;border-left:1px solid #292f38;background:#15191f}.c-rail .scope{display:grid;gap:7px}.c-rail select{width:100%}.c-rail .state-tabs{margin-top:24px;display:grid;grid-template-columns:1fr 1fr}.c-rail .status{margin-top:auto;display:block;background:transparent;padding:0}.c-rail .orb{margin-bottom:18px}.c-rail .title{font-size:18px}.c-rail .detail{font-size:12px;margin-top:8px}.rail-rule{height:1px;background:var(--line);margin:22px 0}.rail-label{color:#747c88;font-size:10px;text-transform:uppercase;letter-spacing:.1em}
    .switcher { position:fixed;left:50%;bottom:24px;transform:translateX(-50%);display:flex;align-items:center;gap:8px;padding:6px;border:1px solid #3b424d;border-radius:999px;background:#f2f4f7;color:#11151a;box-shadow:0 12px 40px #0009;z-index:10 }.switcher button{width:34px;height:34px;border:0;border-radius:50%;background:transparent;color:#11151a;font-size:18px}.switcher button:hover{background:#dfe3e8}.switch-label{min-width:190px;text-align:center;font-size:12px;font-weight:750}.switch-label small{display:block;color:#69717c;font-weight:500}
    @media(max-width:760px){#app{padding-inline:10px}.diff{margin:20px}.a-panel{position:absolute;right:12px;bottom:16px;width:calc(100% - 24px)}.b-wrap,.c-wrap{grid-template-columns:1fr}.b-rail,.c-rail{border:0;border-bottom:1px solid var(--line)}.b-main{padding:32px 24px}.c-rail{min-height:420px}.github{min-height:680px}}
    @media(prefers-reduced-motion:reduce){*{animation-duration:1ms!important;transition-property:opacity,color,background-color!important}}
  </style>
</head>
<body>
  <div class="prototype-mark">THROWAWAY PROTOTYPE · VOICE-PR</div>
  <main id="app"></main>
  <nav class="switcher" aria-label="Prototype variants"><button id="prev" aria-label="Previous variant">←</button><div class="switch-label" id="variant-label"></div><button id="next" aria-label="Next variant">→</button></nav>
  <script>
    const variants={A:'Calm morphing capsule',B:'Outcome workspace',C:'Activity rail'}, validStates=['idle','working','success','blocked']; const params=new URLSearchParams(location.search); let variant=(params.get('variant')||'A').toUpperCase(); if(!variants[variant])variant='A'; let state=params.get('state')||'working'; if(!validStates.includes(state))state='working';
    const stateCopy={idle:['Ready','Review this pull request','Record feedback while you move through the diff.'],working:['Applying','Making and validating the changes…','You can close this tab. Your recording stays local until the run confirms.'],success:['Complete','Updated the null handling and pushed one commit.','The pull request is ready for another look.'],blocked:['Permission needed','Push this pull request was not authorized.','Your completed work remains local. Start a new session with “This pull request” scope.']};
    const states=()=>`<div class="state-tabs">${['idle','working','success','blocked'].map(s=>`<button data-state="${s}" class="${state===s?'on':''}">${s}</button>`).join('')}</div>`;
    const status=()=>{const c=stateCopy[state];return `<div class="status ${state}"><span class="orb"></span><div><div class="kicker">${c[0]}</div><div class="title">${c[1]}</div><div class="detail">${c[2]}</div>${state==='blocked'?'<button class="action">Use PR scope next session</button>':''}</div></div>`};
    const scope=()=>`<div class="scope"><b>Scope</b><select><option>Read only</option><option>Local workspace</option><option selected>This pull request</option><option>This repository · this session</option></select><span class="session">this session only</span></div>`;
    function A(){return `<section class="variant a-shell"><div class="github"><div class="ghbar"><b>bath / voice-pr</b><span>Pull requests</span><span>Actions</span></div><div class="diff"><div class="nums">41<br>42<br>43<br>44<br>45</div><div class="code">function dispatch(review) {<br>&nbsp;&nbsp;const plan = compile(review)<br>&nbsp;&nbsp;return authorize(plan, scope)<br>}<br>&nbsp;</div></div></div><aside class="a-panel">${states()}<div class="a-head"><strong>🎙 voice-pr</strong><span style="margin-left:auto;color:#7e8691">PR #64</span></div><div class="a-context">auth/header-normalization · agent ready</div><div class="a-scope">${scope()}</div><div class="a-status">${status()}</div></aside></section>`}
    function B(){return `<section class="variant b-wrap"><aside class="b-rail"><h2>🎙 voice-pr</h2>${scope()}<div class="rail-rule"></div><div class="rail-label">Pull request</div><p style="font-size:12px">bath/voice-pr #64</p></aside><div class="b-main">${states()}<h1>Turn the review into a finished pull request.</h1><p>Speak in outcomes. Voice-pr keeps the implementation machinery quiet unless something needs you.</p>${status()}<div class="b-meta"><span>agent 7fa2</span><span>auth/header-normalization</span><span>11.8s</span></div></div></section>`}
    function C(){return `<section class="variant c-wrap"><div class="c-canvas"><h1>Review notes</h1><p>Three anchored comments on PR #64</p><div class="comments"><div class="comment">Line 42 · This can be null. Keep the public API unchanged.</div><div class="comment">Line 118 · Preserve the retry semantics here.</div><div class="comment">General · Run the focused test suite before publishing.</div></div></div><aside class="c-rail">${scope()}${states()}<div class="rail-rule"></div><div class="rail-label">Current activity</div>${status()}</aside></section>`}
    function render(){document.querySelector('#app').innerHTML=({A,B,C}[variant])();document.querySelector('#variant-label').innerHTML=`${variant} — ${variants[variant]}<small>← → to compare</small>`;document.querySelectorAll('[data-state]').forEach(b=>b.onclick=()=>{state=b.dataset.state;const u=new URL(location);u.searchParams.set('state',state);history.replaceState({},'',u);render()});}
    function cycle(delta){const keys=Object.keys(variants);variant=keys[(keys.indexOf(variant)+delta+keys.length)%keys.length];const u=new URL(location);u.searchParams.set('variant',variant);history.replaceState({},'',u);render()}
    document.querySelector('#prev').onclick=()=>cycle(-1);document.querySelector('#next').onclick=()=>cycle(1);addEventListener('keydown',e=>{if(/INPUT|TEXTAREA|SELECT/.test(e.target.tagName)||e.target.isContentEditable)return;if(e.key==='ArrowLeft')cycle(-1);if(e.key==='ArrowRight')cycle(1)});render();
  </script>
</body>
</html>
